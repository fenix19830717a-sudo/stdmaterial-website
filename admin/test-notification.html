<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notification System - Hunan Shengtongda Materials Technology Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/admin/assets/js/security.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>

        // 权限验证
        document.addEventListener("DOMContentLoaded", function() {
            // 检查用户是否已登录
            const userInfo = Security.getUserInfo();
            if (!userInfo) {
                window.location.href = "/admin/login.html";
                return;
            }
            
            // 检查用户权限
            if (!Security.checkPermission("user")) {
                window.location.href = "/admin/login.html";
                return;
            }
        });
        
        // 登出功能
        function logout() {
            Security.clearUserInfo();
            window.location.href = "/admin/login.html";
        }
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#13c8ec',
                        'primary-dark': '#0ea5c0',
                        'primary-light': '#5dd9f5',
                        dark: {
                            900: '#101f22',
                            800: '#162326',
                            700: '#1c2d31',
                            600: '#24373b',
                            500: '#2c4145'
                        }
                    },
                    fontFamily: {
                        'space': ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(22, 35, 38, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(19, 200, 236, 0.1); }
        .glass-light { background: rgba(28, 45, 49, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(19, 200, 236, 0.08); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #162326; }
        ::-webkit-scrollbar-thumb { background: #2c4145; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #13c8ec; }
    </style>
</head>
<body class="bg-dark-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-semibold mb-6">Notification System Test</h1>
        
        <div class="glass rounded-xl p-6 mb-6">
            <h2 class="text-xl font-medium mb-4">Test Notification System</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Notification Type</label>
                    <select id="notificationType" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-3 py-2 text-white focus:border-primary focus:outline-none">
                        <option value="order">Order Notification</option>
                        <option value="inventory">Inventory Alert</option>
                        <option value="system">System Message</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Title</label>
                    <input type="text" id="notificationTitle" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-3 py-2 text-white focus:border-primary focus:outline-none" placeholder="Enter notification title">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Message</label>
                    <textarea id="notificationMessage" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-3 py-2 text-white focus:border-primary focus:outline-none" rows="3" placeholder="Enter notification message"></textarea>
                </div>
                
                <button id="addNotification" class="w-full bg-primary hover:bg-primary-dark text-dark-900 font-medium py-2 px-4 rounded-lg transition-colors">
                    Add Notification
                </button>
            </div>
        </div>
        
        <div class="glass rounded-xl p-6">
            <h2 class="text-xl font-medium mb-4">Notification List</h2>
            <div class="space-y-3" id="testNotificationList">
                <!-- Notifications will be displayed here -->
            </div>
        </div>
    </div>

    <script src="/assets/js/notification.js"></script>
    <script>

        // 权限验证
        document.addEventListener("DOMContentLoaded", function() {
            // 检查用户是否已登录
            const userInfo = Security.getUserInfo();
            if (!userInfo) {
                window.location.href = "/admin/login.html";
                return;
            }
            
            // 检查用户权限
            if (!Security.checkPermission("user")) {
                window.location.href = "/admin/login.html";
                return;
            }
        });
        
        // 登出功能
        function logout() {
            Security.clearUserInfo();
            window.location.href = "/admin/login.html";
        }
        document.addEventListener('DOMContentLoaded', function() {
            // Test adding notification
            document.getElementById('addNotification').addEventListener('click', function() {
                const type = document.getElementById('notificationType').value;
                const title = document.getElementById('notificationTitle').value;
                const message = document.getElementById('notificationMessage').value;
                
                if (title && message) {
                    notificationSystem.addNotification({
                        type: type,
                        title: title,
                        message: message
                    });
                    
                    // Clear form
                    document.getElementById('notificationTitle').value = '';
                    document.getElementById('notificationMessage').value = '';
                    
                    // Update test notification list
                    updateTestNotificationList();
                }
            });
            
            // Update test notification list
            function updateTestNotificationList() {
                const list = document.getElementById('testNotificationList');
                if (!list) return;
                
                list.innerHTML = notificationSystem.notifications.map(notification => {
                    const { icon, color } = notificationSystem.getNotificationIcon(notification.type);
                    return `
                        <div class="flex items-start gap-3 p-3 rounded-lg hover:bg-dark-700 transition-colors ${!notification.read ? 'bg-dark-700/30 border-l-2 border-primary' : ''}">
                            <div class="w-8 h-8 rounded-full bg-${color}-500/20 flex items-center justify-center flex-shrink-0">
                                <span class="material-icons text-${color}-400 text-sm">${icon}</span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <p class="text-sm font-medium ${!notification.read ? 'font-semibold' : ''}">${notification.title}</p>
                                    <span class="text-xs text-gray-500">${notification.time}</span>
                                </div>
                                <p class="text-xs text-gray-400">${notification.message}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Initial update
            updateTestNotificationList();
        });
    </script>
</body>
</html>
