    <!-- 添加/编辑导航项模态框 -->
    <div id="nav-item-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-surface-dark rounded-lg p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white" id="modal-title">添加导航项</h3>
                <button id="close-modal" class="text-slate-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="nav-item-form">
                <input type="hidden" id="nav-item-id">
                <input type="hidden" id="nav-role">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1">导航标题</label>
                    <input type="text" id="nav-title" class="w-full bg-deep-navy border border-white/10 rounded-md px-3 py-2 text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-300 mb-1">导航链接</label>
                    <input type="text" id="nav-url" class="w-full bg-deep-navy border border-white/10 rounded-md px-3 py-2 text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none" required>
                </div>
                <div class="mb-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="nav-visible" class="rounded border-white/10 bg-deep-navy text-primary focus:ring-primary" checked>
                        <span class="text-sm text-slate-300">显示导航项</span>
                    </label>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="cancel-modal" class="flex-1 px-4 py-2 border border-white/10 rounded-md text-slate-300 hover:bg-white/5 transition-colors">取消</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-primary text-deep-navy rounded-md font-medium hover:bg-accent transition-colors">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>

        // 权限验证
        document.addEventListener("DOMContentLoaded", function() {
            // 检查用户是否已登录
            const userInfo = Security.getUserInfo();
            if (!userInfo) {
                window.location.href = "/admin/login.html";
                return;
            }
            
            // 检查用户权限
            if (!Security.checkPermission("user")) {
                window.location.href = "/admin/login.html";
                return;
            }
        });
        
        // 登出功能
        function logout() {
            Security.clearUserInfo();
            window.location.href = "/admin/login.html";
        }
        let navigationData = {};
        
        // 初始化页面
        async function initNavigation() {
            try {
                const response = await fetch('/api/navigation');
                if (!response.ok) throw new Error('Failed to fetch navigation data');
                navigationData = await response.json();
                renderNavigation();
            } catch (error) {
                console.error('Error loading navigation:', error);
            }
        }
        
        // 渲染导航条
        function renderNavigation() {
            renderNavList('engineer', navigationData.engineer || []);
            renderNavList('purchaser', navigationData.purchaser || []);
        }
        
        // 渲染导航列表
        function renderNavList(role, items) {
            const container = document.getElementById(`${role}-nav-list`);
            if (!container) return;
            
            container.innerHTML = '';
            
            items.forEach((item, index) => {
                if (!item.visible) return;
                
                const navItem = document.createElement('div');
                navItem.className = 'flex items-center justify-between p-3 bg-deep-navy/50 rounded border border-white/5';
                navItem.innerHTML = `
                    <div>
                        <p class="font-medium text-white">${item.title}</p>
                        <p class="text-xs text-slate-400">${item.url}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button class="edit-nav-item text-slate-400 hover:text-primary transition-colors" data-role="${role}" data-id="${item.id}">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                        <button class="delete-nav-item text-slate-400 hover:text-red-400 transition-colors" data-role="${role}" data-id="${item.id}">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                `;
                container.appendChild(navItem);
            });
            
            // 添加事件监听器
            document.querySelectorAll('.edit-nav-item').forEach(btn => {
                btn.addEventListener('click', handleEditNavItem);
            });
            
            document.querySelectorAll('.delete-nav-item').forEach(btn => {
                btn.addEventListener('click', handleDeleteNavItem);
            });
        }
        
        // 处理添加导航项
        function handleAddNavItem(role) {
            document.getElementById('modal-title').textContent = '添加导航项';
            document.getElementById('nav-item-id').value = '';
            document.getElementById('nav-role').value = role;
            document.getElementById('nav-title').value = '';
            document.getElementById('nav-url').value = '';
            document.getElementById('nav-visible').checked = true;
            document.getElementById('nav-item-modal').classList.remove('hidden');
        }
        
        // 处理编辑导航项
        function handleEditNavItem(e) {
            const role = e.target.closest('button').dataset.role;
            const id = e.target.closest('button').dataset.id;
            const item = navigationData[role].find(item => item.id === id);
            
            if (item) {
                document.getElementById('modal-title').textContent = '编辑导航项';
                document.getElementById('nav-item-id').value = item.id;
                document.getElementById('nav-role').value = role;
                document.getElementById('nav-title').value = item.title;
                document.getElementById('nav-url').value = item.url;
                document.getElementById('nav-visible').checked = item.visible;
                document.getElementById('nav-item-modal').classList.remove('hidden');
            }
        }
        
        // 处理删除导航项
        async function handleDeleteNavItem(e) {
            const role = e.target.closest('button').dataset.role;
            const id = e.target.closest('button').dataset.id;
            
            if (confirm('确定要删除这个导航项吗？')) {
                try {
                    const response = await fetch(`/api/navigation/${role}/items/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        }
                    });
                    
                    if (response.ok) {
                        initNavigation();
                    } else {
                        throw new Error('Failed to delete navigation item');
                    }
                } catch (error) {
                    console.error('Error deleting navigation item:', error);
                    alert('删除失败，请重试');
                }
            }
        }
        
        // 处理表单提交
        document.getElementById('nav-item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('nav-item-id').value;
            const role = document.getElementById('nav-role').value;
            const title = document.getElementById('nav-title').value;
            const url = document.getElementById('nav-url').value;
            const visible = document.getElementById('nav-visible').checked;
            
            try {
                let response;
                if (id) {
                    // 更新导航项
                    response = await fetch(`/api/navigation/${role}/items/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ title, url, visible })
                    });
                } else {
                    // 添加导航项
                    response = await fetch(`/api/navigation/${role}/items`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ title, url, visible })
                    });
                }
                
                if (response.ok) {
                    document.getElementById('nav-item-modal').classList.add('hidden');
                    initNavigation();
                } else {
                    throw new Error('Failed to save navigation item');
                }
            } catch (error) {
                console.error('Error saving navigation item:', error);
                alert('保存失败，请重试');
            }
        });
        
        // 关闭模态框
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('nav-item-modal').classList.add('hidden');
        });
        
        document.getElementById('cancel-modal').addEventListener('click', () => {
            document.getElementById('nav-item-modal').classList.add('hidden');
        });
        
        // 添加事件监听器
        document.getElementById('add-engineer-item').addEventListener('click', () => handleAddNavItem('engineer'));
        document.getElementById('add-purchaser-item').addEventListener('click', () => handleAddNavItem('purchaser'));
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', initNavigation);
    </script>
