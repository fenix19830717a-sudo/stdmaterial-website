<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Test - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="/admin/assets/js/security.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06b6d4",
                        "primary-dark": "#0891b2",
                        "accent": "#22d3ee",
                        "background-dark": "#0f172a",
                        "surface-dark": "#1e293b",
                        "deep-navy": "#020617",
                        "secondary": "#f97316",
                        "success": "#22c55e",
                        "purple": "#a855f7"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background: #020617;
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="font-display text-slate-100">
    <div class="min-h-screen p-6">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">Security Test</h1>
                <p class="text-slate-400">Test all security features</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- XSS Test -->
                <div class="card p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">XSS Protection Test</h2>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Test Input</label>
                        <input type="text" id="xssInput" class="w-full px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-white" placeholder="Enter potentially malicious input">
                    </div>
                    <button id="testXSS" class="btn-primary w-full py-2 rounded-lg text-white font-medium">Test XSS Protection</button>
                    <div id="xssResult" class="mt-4 p-4 rounded-lg bg-white/5"></div>
                </div>
                
                <!-- CSRF Test -->
                <div class="card p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">CSRF Protection Test</h2>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-300 mb-2">CSRF Token</label>
                        <input type="text" id="csrfToken" class="w-full px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-white" readonly>
                    </div>
                    <button id="generateCSRF" class="btn-primary w-full py-2 rounded-lg text-white font-medium">Generate CSRF Token</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Encryption Test -->
                <div class="card p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Encryption Test</h2>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Test Data</label>
                        <input type="text" id="encryptInput" class="w-full px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-white" placeholder="Enter data to encrypt">
                    </div>
                    <button id="testEncryption" class="btn-primary w-full py-2 rounded-lg text-white font-medium">Test Encryption</button>
                    <div id="encryptionResult" class="mt-4 p-4 rounded-lg bg-white/5"></div>
                </div>
                
                <!-- Permission Test -->
                <div class="card p-6">
                    <h2 class="text-xl font-semibold text-white mb-4">Permission Test</h2>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-300 mb-2">Required Role</label>
                        <select id="roleSelect" class="w-full px-4 py-2 rounded-lg bg-white/5 border border-white/10 text-white">
                            <option value="guest">Guest</option>
                            <option value="user">User</option>
                            <option value="manager">Manager</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button id="testPermission" class="btn-primary w-full py-2 rounded-lg text-white font-medium">Test Permission</button>
                    <div id="permissionResult" class="mt-4 p-4 rounded-lg bg-white/5"></div>
                </div>
            </div>
            
            <div class="card p-6">
                <h2 class="text-xl font-semibold text-white mb-4">User Info Test</h2>
                <button id="testUserInfo" class="btn-primary w-full py-2 rounded-lg text-white font-medium">Test User Info Storage</button>
                <div id="userInfoResult" class="mt-4 p-4 rounded-lg bg-white/5"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 权限验证
        document.addEventListener('DOMContentLoaded', function() {
            // 检查用户是否已登录
            const userInfo = Security.getUserInfo();
            if (!userInfo) {
                window.location.href = 'login.html';
                return;
            }
            
            // 检查用户权限
            if (!Security.checkPermission('user')) {
                window.location.href = 'login.html';
                return;
            }
        });
        
        // XSS测试
        document.getElementById('testXSS').addEventListener('click', function() {
            const input = document.getElementById('xssInput').value;
            const sanitized = Security.escapeHTML(input);
            const resultDiv = document.getElementById('xssResult');
            resultDiv.innerHTML = `
                <div class="mb-2">
                    <strong class="text-slate-300">Original Input:</strong>
                    <div class="mt-1 p-2 bg-white/5 rounded">${input}</div>
                </div>
                <div>
                    <strong class="text-slate-300">Sanitized Input:</strong>
                    <div class="mt-1 p-2 bg-white/5 rounded">${sanitized}</div>
                </div>
            `;
        });
        
        // CSRF令牌测试
        document.getElementById('generateCSRF').addEventListener('click', function() {
            const token = Security.generateCSRFToken();
            document.getElementById('csrfToken').value = token;
        });
        
        // 加密测试
        document.getElementById('testEncryption').addEventListener('click', function() {
            const input = document.getElementById('encryptInput').value;
            const encrypted = Security.encrypt(input);
            const decrypted = Security.decrypt(encrypted);
            const resultDiv = document.getElementById('encryptionResult');
            resultDiv.innerHTML = `
                <div class="mb-2">
                    <strong class="text-slate-300">Original Data:</strong>
                    <div class="mt-1 p-2 bg-white/5 rounded">${input}</div>
                </div>
                <div class="mb-2">
                    <strong class="text-slate-300">Encrypted Data:</strong>
                    <div class="mt-1 p-2 bg-white/5 rounded text-xs">${encrypted}</div>
                </div>
                <div>
                    <strong class="text-slate-300">Decrypted Data:</strong>
                    <div class="mt-1 p-2 bg-white/5 rounded">${decrypted}</div>
                </div>
            `;
        });
        
        // 权限测试
        document.getElementById('testPermission').addEventListener('click', function() {
            const role = document.getElementById('roleSelect').value;
            const hasPermission = Security.checkPermission(role);
            const resultDiv = document.getElementById('permissionResult');
            resultDiv.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined ${hasPermission ? 'text-success' : 'text-red-500'}">
                        ${hasPermission ? 'check_circle' : 'cancel'}
                    </span>
                    <span>
                        ${hasPermission ? 'Access granted' : 'Access denied'} for role: ${role}
                    </span>
                </div>
            `;
        });
        
        // 用户信息测试
        document.getElementById('testUserInfo').addEventListener('click', function() {
            const userInfo = Security.getUserInfo();
            const resultDiv = document.getElementById('userInfoResult');
            if (userInfo) {
                resultDiv.innerHTML = `
                    <div class="p-4 bg-white/5 rounded">
                        <h3 class="font-medium text-white mb-2">User Info:</h3>
                        <pre class="text-sm text-slate-300">${JSON.stringify(userInfo, null, 2)}</pre>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="p-4 bg-white/5 rounded text-red-500">
                        No user info found
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
