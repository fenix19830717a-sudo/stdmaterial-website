<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 诊断测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { background: #162326; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #13c8ec; color: #101f22; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #0ea5c0; }
        .success { color: #22c55e; }
        .error { color: #ef4444 }
        .info { color: #3b82f6; }
        pre { background: #0f0f1a; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard 诊断测试</h1>
        
        <div class="section">
            <h2>步骤 1: 检查 JavaScript 文件加载</h2>
            <button onclick="checkScripts()">检查脚本加载</button>
            <div id="scripts-result"></div>
        </div>
        
        <div class="section">
            <h2>步骤 2: 检查 DOM 元素</h2>
            <button onclick="checkDOM()">检查 DOM 元素</button>
            <div id="dom-result"></div>
        </div>
        
        <div class="section">
            <h2>步骤 3: 检查事件监听器</h2>
            <button onclick="checkEventListeners()">检查事件监听器</button>
            <div id="events-result"></div>
        </div>
        
        <div class="section">
            <h2>步骤 4: 测试按钮点击</h2>
            <button onclick="testButtonClick()">测试按钮点击</button>
            <div id="button-result"></div>
        </div>
        
        <div class="section">
            <h2>步骤 5: 跳转到 Dashboard</h2>
            <button onclick="goToDashboard()">跳转到 Dashboard</button>
        </div>
    </div>
    
    <script>
        function checkScripts() {
            const result = document.getElementById('scripts-result');
            result.innerHTML = '<h3>JavaScript 文件检查:</h3>';
            
            // 检查 Security 类
            if (typeof Security !== 'undefined') {
                result.innerHTML += '<p class="success">✓ Security 类已加载</p>';
            } else {
                result.innerHTML += '<p class="error">✗ Security 类未加载</p>';
            }
            
            // 检查 AdminPanel 对象
            if (typeof AdminPanel !== 'undefined') {
                result.innerHTML += '<p class="success">✓ AdminPanel 对象已加载</p>';
            } else {
                result.innerHTML += '<p class="error">✗ AdminPanel 对象未加载</p>';
            }
            
            // 检查 Chart 类
            if (typeof Chart !== 'undefined') {
                result.innerHTML += '<p class="success">✓ Chart 类已加载</p>';
            } else {
                result.innerHTML += '<p class="error">✗ Chart 类未加载</p>';
            }
            
            // 检查 GrindingEquipmentB2B 对象
            if (typeof GrindingEquipmentB2B !== 'undefined') {
                result.innerHTML += '<p class="success">✓ GrindingEquipmentB2B 对象已加载</p>';
            } else {
                result.innerHTML += '<p class="error">✗ GrindingEquipmentB2B 对象未加载</p>';
            }
        }
        
        function checkDOM() {
            const result = document.getElementById('dom-result');
            result.innerHTML = '<h3>DOM 元素检查:</h3>';
            
            // 检查关键 DOM 元素
            const elements = [
                'revenueChart',
                'orderTrendChart',
                'orderStatusChart',
                'currentDate',
                'sidebar-toggle'
            ];
            
            elements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    result.innerHTML += '<p class="success">✓ #' + id + ' 存在</p>';
                } else {
                    result.innerHTML += '<p class="error">✗ #' + id + ' 不存在</p>';
                }
            });
        }
        
        function checkEventListeners() {
            const result = document.getElementById('events-result');
            result.innerHTML = '<h3>事件监听器检查:</h3>';
            
            // 检查 AdminPanel 是否已初始化
            if (typeof AdminPanel !== 'undefined' && AdminPanel.state) {
                result.innerHTML += '<p class="success">✓ AdminPanel.state 存在</p>';
                result.innerHTML += '<p>isLoggedIn: ' + AdminPanel.state.isLoggedIn + '</p>';
                result.innerHTML += '<p>currentUser: ' + JSON.stringify(AdminPanel.state.currentUser) + '</p>';
            } else {
                result.innerHTML += '<p class="error">✗ AdminPanel 未初始化</p>';
            }
            
            // 检查 sidebar-toggle 按钮的事件监听器
            const sidebarToggle = document.querySelector('.sidebar-toggle');
            if (sidebarToggle) {
                result.innerHTML += '<p class="success">✓ sidebar-toggle 按钮存在</p>';
                // 尝试获取事件监听器（这个方法可能不可靠）
                result.innerHTML += '<p>事件监听器数量: ' + (getEventListeners ? getEventListeners(sidebarToggle).click.length : '无法获取') + '</p>';
            } else {
                result.innerHTML += '<p class="error">✗ sidebar-toggle 按钮不存在</p>';
            }
        }
        
        function testButtonClick() {
            const result = document.getElementById('button-result');
            result.innerHTML = '<h3>按钮点击测试:</h3>';
            
            // 测试 sidebar-toggle 按钮点击
            const sidebarToggle = document.querySelector('.sidebar-toggle');
            if (sidebarToggle) {
                result.innerHTML += '<p>尝试点击 sidebar-toggle 按钮...</p>';
                sidebarToggle.click();
                result.innerHTML += '<p class="success">✓ 点击成功</p>';
            } else {
                result.innerHTML += '<p class="error">✗ sidebar-toggle 按钮不存在</p>';
            }
        }
        
        function goToDashboard() {
            // 设置登录状态
            sessionStorage.setItem('userRole', 'admin');
            sessionStorage.setItem('userInfo', JSON.stringify({ email: 'admin@admin.com', role: 'admin' }));
            
            // 跳转到 dashboard
            window.location.href = '/admin/dashboard.html';
        }
    </script>
</body>
</html>
