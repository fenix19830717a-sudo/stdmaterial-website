<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hunan Shengtongda Materials</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="../assets/css/output.css">
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glass-panel {
            background: rgba(16, 31, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 200, 236, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .brand-shadow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body class="bg-deep-navy text-slate-200 font-display min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- 背景装饰 -->
    <div class="fixed inset-0 z-0 bg-gradient-to-br from-primary/5 via-transparent to-cyan-500/5 pointer-events-none"></div>
    <div class="fixed -top-40 -right-40 w-96 h-96 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed -bottom-40 -left-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-[100px] pointer-events-none"></div>
    
    <!-- 登录表单 -->
    <div class="relative z-10 w-full max-w-md px-4">
        <div class="glass-panel rounded-2xl p-8">
            <!-- 品牌 Logo -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center brand-shadow mx-auto mb-4">
                    <span class="material-symbols-outlined text-white text-2xl">precision_manufacturing</span>
                </div>
                <h1 class="text-2xl font-bold text-white mb-2">HUNAN SHENGTONGDA</h1>
                <p class="text-sm text-primary font-medium mb-4">MATERIALS TECHNOLOGY</p>
                <p class="text-slate-400 text-sm">Admin Portal</p>
            </div>
            
            <!-- 登录表单 -->
            <form class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-sm">email</span>
                        </span>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                               class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-surface-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-white placeholder-slate-500" 
                               placeholder="Enter your email">
                    </div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                        <a href="#" class="text-xs text-primary hover:text-primary/80 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-sm">lock</span>
                        </span>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                               class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-surface-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-white placeholder-slate-500" 
                               placeholder="Enter your password">
                    </div>
                </div>
                
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                           class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-300">Remember me</label>
                </div>
                
                <div>
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-deep-navy bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                        Sign in
                    </button>
                </div>
            </form>
            
            <!-- 版权信息 -->
            <div class="mt-8 text-center pt-6 border-t border-white/5">
                <p class="text-xs text-slate-500">© 2026 Hunan Shengtongda Materials Technology Co., Ltd. All Rights Reserved.</p>
            </div>
        </div>
    </div>
    
    <script>
        // 表单提交处理
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // TODO: 实现实际的登录逻辑
            console.log('Login attempt:', { email, password });
            alert('Login functionality will be implemented later.');
        });
    </script>
</body>
</html>
