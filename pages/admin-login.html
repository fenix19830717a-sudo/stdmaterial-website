<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NanoMech</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                        "secondary-dark": "#16282c",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(16, 31, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 200, 236, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .neon-shadow {
            box-shadow: 0 0 15px rgba(19, 200, 236, 0.3);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

    <script src="../assets/minified/lazy-loader.js" defer></script>
</head>
<body class="bg-background-dark text-slate-200 font-display min-h-screen flex items-center justify-center">
    <div class="fixed inset-0 z-0 bg-grid-pattern bg-[size:40px_40px] pointer-events-none"></div>
    <div class="fixed inset-0 z-0 bg-gradient-to-b from-transparent via-background-dark/80 to-background-dark pointer-events-none"></div>
    
    <div class="relative z-10 w-full max-w-md">
        <div class="glass-panel rounded-xl p-8">
            <div class="text-center mb-10">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center neon-shadow mx-auto mb-4">
                    <span class="material-icons text-white text-2xl">admin_panel_settings</span>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Admin Portal</h1>
                <p class="text-slate-400">Sign in to access the NanoMech admin dashboard</p>
            </div>
            
            <form class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-icons text-slate-500 text-sm">email</span>
                        </span>
                        <input id="email" name="email" type="email" autocomplete="email" required class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-secondary-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-white placeholder-slate-500" placeholder="Enter your email">
                    </div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                        <a href="#" class="text-xs text-primary hover:text-primary/80 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-icons text-slate-500 text-sm">lock</span>
                        </span>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-secondary-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-white placeholder-slate-500" placeholder="Enter your password">
                    </div>
                </div>
                
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-300">Remember me</label>
                </div>
                
                <div>
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-background-dark bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                        Sign in
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center">
                <p class="text-xs text-slate-500">© 2024 NanoMech Inc. All rights reserved.</p>
            </div>
        </div>
    </div>
    
    <script>
        // Form submission
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate login process
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
