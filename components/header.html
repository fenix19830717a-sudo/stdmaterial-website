    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "primary-dark": "#0ea5e9",
                        "accent": "#22d3ee",
                        "background-dark": "#101f22",
                        "surface-dark": "#16282c",
                        "deep-navy": "#0c1a1d",

                        "success": "#22c55e"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #13c8ec05 1px, transparent 1px), linear-gradient(to bottom, #13c8ec05 1px, transparent 1px)",
                        'blueprint': "linear-gradient(to right, #16282c 1px, transparent 1px), linear-gradient(to bottom, #16282c 1px, transparent 1px)"

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #101f22;
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(16, 31, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(19, 200, 236, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .neon-shadow {
            box-shadow: 0 0 15px rgba(19, 200, 236, 0.3);
        }
        .tech-border {
            position: relative;
        }
        .tech-border::before, .tech-border::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid #13c8ec;
            transition: all 0.3s ease;
        }
        .tech-border::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tech-border::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
        .tech-border:hover::before, .tech-border:hover::after {
            width: 100%;
            height: 100%;
        }
        .material-card {
            background: linear-gradient(145deg, rgba(22, 40, 44, 0.7) 0%, rgba(12, 26, 29, 0.9) 100%);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
