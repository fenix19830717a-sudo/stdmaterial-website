<!DOCTYPE html><html><head><meta charset="UTF-8"><title>产品管理</title><style>body{font-family:Arial,sans-serif;background:#f0f2f5;margin:0}.header{background:#001529;color:white;padding:16px 24px}.container{max-width:1400px;margin:0 auto;padding:24px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.stat-card{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}.stat-value{font-size:28px;font-weight:600;color:#1890ff}.stat-label{color:#666;font-size:14px}.product-table{background:white;border-radius:8px;overflow:hidden}table{width:100%;border-collapse:collapse}th{background:#fafafa;padding:12px 16px;text-align:left}td{padding:12px 16px;border-bottom:1px solid #f0f0f0}.product-img{width:60px;height:60px;object-fit:cover;border-radius:4px}</style></head><body><div class="header"><h1>产品管理后台 - STD Material</h1></div><div class="container"><div class="stats"><div class="stat-card"><div class="stat-value" id="totalCount">48</div><div class="stat-label">总产品数</div></div><div class="stat-card"><div class="stat-value">41</div><div class="stat-label">已上架</div></div><div class="stat-card"><div class="stat-value">10</div><div class="stat-label">分类</div></div><div class="stat-card"><div class="stat-value">37</div><div class="stat-label">产品图片</div></div></div><div class="product-table"><table id="productTable"><thead><tr><th>图片</th><th>产品名称</th><th>分类</th><th>价格</th><th>状态</th></tr></thead><tbody></tbody></table></div></div><script>fetch("/api/products.json").then(r=>r.json()).then(d=>{document.getElementById("totalCount").textContent=d.products.length;document.querySelector("#productTable tbody").innerHTML=d.products.slice(0,30).map(p=>`<tr><td><img src="${p.image_urls?.[0]||"/products-images/default.jpg"}" class="product-img"></td><td>${p.name}<br><small style="color:#666">${p.name_cn||""}</small></td><td>${p.category}</td><td>${p.price?.fob_price||"-"}</td><td>${p.status||"pending"}</td></tr>`).join("")})</script></body></html>
