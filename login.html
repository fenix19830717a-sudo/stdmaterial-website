<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hunan Shengtongda Materials</title>
    <meta name="description" content="Login to your Hunan Shengtongda Materials account." />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-text-primary font-display min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                    <div class="w-12 h-12 bg-primary/20 border border-primary/50 rounded flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-2xl">precision_manufacturing</span>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-white">HUNAN SHENGTONGDA</span>
                </a>
                <h1 class="heading-xl mb-2">Welcome Back</h1>
                <p class="text-text-secondary">Sign in to your account to continue</p>
            </div>

            <div class="glass-panel rounded-2xl p-8">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-2">Email Address</label>
                        <input type="email" class="w-full bg-surface/50 border border-white/10 text-white rounded-lg py-3 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="you@company.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-2">Password</label>
                        <input type="password" class="w-full bg-surface/50 border border-white/10 text-white rounded-lg py-3 px-4 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="••••••••">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="rounded bg-surface/50 border-white/10 text-primary focus:ring-primary">
                            <span class="text-text-secondary text-sm">Remember me</span>
                        </label>
                        <a href="#" class="text-primary text-sm hover:text-cyan-300 transition-colors">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-primary w-full">
                        Sign In
                    </button>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-[#0a0a0f] text-text-muted">or continue with</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="btn-secondary flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">mail</span>
                        Google
                    </button>
                    <button class="btn-secondary flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">work</span>
                        LinkedIn
                    </button>
                </div>
            </div>

            <p class="text-center text-text-secondary mt-6">
                Don't have an account? <a href="#" class="text-primary hover:text-cyan-300 transition-colors font-medium">Contact us</a>
            </p>

            <p class="text-center text-text-secondary mt-4">
                <a href="index.html" class="flex items-center justify-center gap-2 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Back to Home
                </a>
            </p>
        </div>
    </div>
</body>
</html>
