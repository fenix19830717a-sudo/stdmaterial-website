<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - NanoMech Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#13c8ec',
                        'primary-dark': '#0ea5c0',
                        'primary-light': '#5dd9f5',
                        dark: {
                            900: '#101f22',
                            800: '#162326',
                            700: '#1c2d31',
                            600: '#24373b',
                            500: '#2c4145'
                        }
                    },
                    fontFamily: {
                        'space': ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(22, 35, 38, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(19, 200, 236, 0.1); }
        .glass-light { background: rgba(28, 45, 49, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(19, 200, 236, 0.08); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #162326; }
        ::-webkit-scrollbar-thumb { background: #2c4145; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #13c8ec; }
    </style>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/api-config.js"></script>
</head>
<body class="bg-dark-900 text-white min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-dark-800 border-r border-dark-600 flex flex-col">
            <div class="p-6 border-b border-dark-600">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center">
                        <span class="material-icons text-dark-900">science</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-semibold text-white">晟通达</h1>
                        <p class="text-xs text-gray-500">管理面板</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">dashboard</span>
                    <span>仪表盘</span>
                </a>
                <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-primary/10 text-primary border border-primary/20">
                    <span class="material-icons text-xl">inventory_2</span>
                    <span>产品管理</span>
                </a>
                <a href="inquiries.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">mail</span>
                    <span>询盘管理</span>
                </a>
                <a href="orders.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">shopping_cart</span>
                    <span>订单管理</span>
                </a>
                <a href="customers.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">people</span>
                    <span>客户管理</span>
                </a>
                <a href="marketing.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">campaign</span>
                    <span>营销管理</span>
                </a>
                <a href="statistics.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">analytics</span>
                    <span>数据统计</span>
                </a>
                <a href="api-settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">api</span>
                    <span>API配置</span>
                </a>
                <a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all">
                    <span class="material-icons text-xl">settings</span>
                    <span>系统设置</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <header class="sticky top-0 z-40 glass border-b border-dark-600 px-6 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-semibold">产品管理</h1>
                        <p class="text-gray-400 text-sm mt-1">管理产品目录</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="exportProducts()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-dark-700 hover:bg-dark-600 text-gray-300 transition-all">
                            <span class="material-icons text-lg">download</span>
                            <span>导出</span>
                        </button>
                        <button onclick="openProductModal()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary hover:bg-primary-dark text-dark-900 font-medium transition-all">
                            <span class="material-icons text-lg">add</span>
                            <span>添加产品</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="p-6">
                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <div class="glass rounded-xl p-4">
                        <p class="text-gray-400 text-sm">总产品数</p>
                        <p class="text-2xl font-semibold mt-1" id="totalProducts">0</p>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <p class="text-gray-400 text-sm">库存充足</p>
                        <p class="text-2xl font-semibold mt-1 text-green-400" id="inStock">0</p>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <p class="text-gray-400 text-sm">库存不足</p>
                        <p class="text-2xl font-semibold mt-1 text-yellow-400" id="lowStock">0</p>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <p class="text-gray-400 text-sm">缺货</p>
                        <p class="text-2xl font-semibold mt-1 text-red-400" id="outOfStock">0</p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="glass rounded-xl p-4 mb-6">
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="flex-1 min-w-[200px]">
                            <div class="relative">
                                <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
                                <input type="text" id="searchInput" placeholder="搜索产品..." 
                                    class="w-full bg-dark-700 border border-dark-600 rounded-lg pl-10 pr-4 py-2.5 text-white placeholder-gray-500 focus:border-primary focus:outline-none"
                                    oninput="filterProducts()">
                            </div>
                        </div>
                        <select id="categoryFilter" onchange="filterProducts()" class="bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                            <option value="">全部分类</option>
                            <option value="Grinding Jars">研磨罐</option>
                            <option value="Grinding Media">研磨介质</option>
                            <option value="Equipment">设备</option>
                            <option value="Accessories">配件</option>
                        </select>
                        <select id="stockFilter" onchange="filterProducts()" class="bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                            <option value="">全部库存状态</option>
                            <option value="in">库存充足</option>
                            <option value="low">库存不足</option>
                            <option value="out">缺货</option>
                        </select>
                    </div>
                </div>

                <!-- Products Table -->
                <div class="glass rounded-xl overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-dark-700">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">产品</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">SKU</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">分类</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">价格</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">库存</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">状态</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="divide-y divide-dark-600">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeProductModal()"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl max-h-[90vh] overflow-auto">
            <div class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-semibold" id="modalTitle">添加产品</h2>
                    <button onclick="closeProductModal()" class="text-gray-400 hover:text-white">
                        <span class="material-icons">close</span>
                    </button>
                </div>
                <form id="productForm" onsubmit="saveProduct(event)">
                    <input type="hidden" id="productId">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">产品名称</label>
                            <input type="text" id="productName" required class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">SKU</label>
                            <input type="text" id="productSku" required class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">分类</label>
                            <select id="productCategory" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                                <option value="Grinding Jars">研磨罐</option>
                                <option value="Grinding Media">研磨介质</option>
                                <option value="Equipment">设备</option>
                                <option value="Accessories">配件</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">价格</label>
                            <input type="number" id="productPrice" step="0.01" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm text-gray-400 mb-1">描述</label>
                        <textarea id="productDescription" rows="3" class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-white focus:border-primary focus:outline-none"></textarea>
                    </div>
                    
                    <!-- Image Upload Section -->
                    <div class="mb-4">
                        <label class="block text-sm text-gray-400 mb-2">产品图片</label>
                        <div id="imageUploadArea" class="border-2 border-dashed border-dark-600 rounded-lg p-6 text-center hover:border-primary transition-colors cursor-pointer"
                             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" onclick="document.getElementById('imageInput').click()">
                            <span class="material-icons text-4xl text-gray-500 mb-2">cloud_upload</span>
                            <p class="text-gray-400 text-sm">拖拽图片到此处或点击上传</p>
                            <p class="text-gray-500 text-xs mt-1">支持 JPG, PNG, WebP 格式，单张最大 5MB</p>
                            <input type="file" id="imageInput" accept="image/*" multiple class="hidden" onchange="handleImageSelect(event)">
                        </div>
                        
                        <!-- Image Preview Area -->
                        <div id="imagePreviewArea" class="grid grid-cols-4 gap-3 mt-4 hidden">
                            <!-- Images will be inserted here -->
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-3">
                        <button type="button" onclick="closeProductModal()" class="px-6 py-2.5 rounded-lg bg-dark-700 hover:bg-dark-600 text-gray-300">取消</button>
                        <button type="submit" class="px-6 py-2.5 rounded-lg bg-primary hover:bg-primary-dark text-dark-900 font-medium">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let filteredProducts = [];

        // Default products data
        const defaultProducts = [
            { id: 1, name: "Alumina Ceramic Grinding Jar", sku: "GJ-AL-500", category: "Grinding Jars", price: 125.00, stock: 50, status: "active" },
            { id: 2, name: "Stainless Steel Grinding Jar", sku: "GJ-SS-1000", category: "Grinding Jars", price: 220.00, stock: 30, status: "active" },
            { id: 3, name: "Zirconia Grinding Jar", sku: "GJ-ZR-250", category: "Grinding Jars", price: 350.00, stock: 15, status: "active" },
            { id: 4, name: "Planetary Ball Mill", sku: "EQ-PM-4X500", category: "Equipment", price: 8500.00, stock: 5, status: "active" },
            { id: 5, name: "Zirconia Grinding Media", sku: "GM-ZR-5MM", category: "Grinding Media", price: 85.00, stock: 0, status: "out_of_stock" }
        ];

        function init() {
            const stored = localStorage.getItem('nanomech_products');
            if (stored) {
                products = JSON.parse(stored);
            } else {
                products = [...defaultProducts];
                saveProducts();
            }
            filteredProducts = [...products];
            renderProducts();
            updateStats();
        }

        function saveProducts() {
            localStorage.setItem('nanomech_products', JSON.stringify(products));
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('inStock').textContent = products.filter(p => p.stock > 10).length;
            document.getElementById('lowStock').textContent = products.filter(p => p.stock > 0 && p.stock <= 10).length;
            document.getElementById('outOfStock').textContent = products.filter(p => p.stock === 0).length;
        }

        function renderProducts() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = filteredProducts.map(product => `
                <tr class="hover:bg-dark-700/50">
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-dark-600 flex items-center justify-center overflow-hidden">
                                ${product.images && product.images.length > 0 
                                    ? `<img src="${product.images[0]}" alt="${product.name}" class="w-full h-full object-cover">`
                                    : `<span class="material-icons text-gray-400">inventory_2</span>`
                                }
                            </div>
                            <div>
                                <span class="font-medium block">${product.name}</span>
                                ${product.images && product.images.length > 1 
                                    ? `<span class="text-xs text-gray-500">+${product.images.length - 1} 张图片</span>`
                                    : ''
                                }
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-gray-400">${product.sku}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 rounded-full text-xs bg-dark-600">${product.category}</span>
                    </td>
                    <td class="px-4 py-3">$${product.price?.toFixed(2) || '0.00'}</td>
                    <td class="px-4 py-3">${product.stock}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 rounded-full text-xs ${getStatusClass(product)}">${product.status}</span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <button onclick="editProduct(${product.id})" class="p-1.5 rounded hover:bg-dark-600 text-gray-400 hover:text-white">
                                <span class="material-icons text-lg">edit</span>
                            </button>
                            <button onclick="deleteProduct(${product.id})" class="p-1.5 rounded hover:bg-dark-600 text-gray-400 hover:text-red-400">
                                <span class="material-icons text-lg">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(product) {
            if (product.stock === 0) return 'bg-red-500/20 text-red-400';
            if (product.stock <= 10) return 'bg-yellow-500/20 text-yellow-400';
            return 'bg-green-500/20 text-green-400';
        }

        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const stock = document.getElementById('stockFilter').value;

            filteredProducts = products.filter(p => {
                const matchSearch = !search || p.name.toLowerCase().includes(search) || p.sku.toLowerCase().includes(search);
                const matchCategory = !category || p.category === category;
                let matchStock = true;
                if (stock === 'in') matchStock = p.stock > 10;
                else if (stock === 'low') matchStock = p.stock > 0 && p.stock <= 10;
                else if (stock === 'out') matchStock = p.stock === 0;
                return matchSearch && matchCategory && matchStock;
            });

            renderProducts();
        }

        function openProductModal() {
            document.getElementById('modalTitle').textContent = '添加产品';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            currentProductImages = [];
            renderImagePreviews();
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modalTitle').textContent = '编辑产品';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productSku').value = product.sku;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.description || '';
            
            // Load existing images
            currentProductImages = (product.images || []).map((imgData, index) => ({
                id: Date.now() + index,
                name: `image_${index + 1}`,
                data: imgData
            }));
            renderImagePreviews();
            
            document.getElementById('productModal').classList.remove('hidden');
        }

        // Image upload variables
        let currentProductImages = [];

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('border-primary', 'bg-primary/10');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('border-primary', 'bg-primary/10');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('border-primary', 'bg-primary/10');
            const files = event.dataTransfer.files;
            processImages(files);
        }

        function handleImageSelect(event) {
            const files = event.target.files;
            processImages(files);
        }

        function processImages(files) {
            const maxSize = 5 * 1024 * 1024; // 5MB
            const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
            
            Array.from(files).forEach(file => {
                if (!allowedTypes.includes(file.type)) {
                    alert(`不支持的文件格式: ${file.name}`);
                    return;
                }
                
                if (file.size > maxSize) {
                    alert(`文件过大: ${file.name} (最大5MB)`);
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    currentProductImages.push({
                        id: Date.now() + Math.random(),
                        name: file.name,
                        data: e.target.result
                    });
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderImagePreviews() {
            const previewArea = document.getElementById('imagePreviewArea');
            if (currentProductImages.length === 0) {
                previewArea.classList.add('hidden');
                return;
            }
            
            previewArea.classList.remove('hidden');
            previewArea.innerHTML = currentProductImages.map((img, index) => `
                <div class="relative group">
                    <img src="${img.data}" alt="${img.name}" class="w-full h-24 object-cover rounded-lg">
                    <button type="button" onclick="removeImage(${index})" 
                            class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="material-icons text-sm">close</span>
                    </button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            currentProductImages.splice(index, 1);
            renderImagePreviews();
        }

        function saveProduct(event) {
            event.preventDefault();
            const id = document.getElementById('productId').value;
            const productData = {
                name: document.getElementById('productName').value,
                sku: document.getElementById('productSku').value,
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value) || 0,
                description: document.getElementById('productDescription').value,
                status: 'active',
                images: currentProductImages.map(img => img.data)
            };

            if (id) {
                const index = products.findIndex(p => p.id == id);
                if (index !== -1) {
                    products[index] = { ...products[index], ...productData };
                }
            } else {
                const newId = Math.max(...products.map(p => p.id), 0) + 1;
                products.push({ id: newId, ...productData, stock: 0 });
            }

            saveProducts();
            filteredProducts = [...products];
            renderProducts();
            updateStats();
            closeProductModal();
            currentProductImages = [];
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                filteredProducts = [...products];
                renderProducts();
                updateStats();
            }
        }

        function exportProducts() {
            const csv = products.map(p => `${p.name},${p.sku},${p.category},${p.price},${p.stock}`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.csv';
            a.click();
        }

        init();
    </script>
</body>
</html>
