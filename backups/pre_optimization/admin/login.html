<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Grinding Equipment B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d4aa",
                        "primary-dark": "#00b894",
                        "background-dark": "#0a0a0f",
                        "secondary": "#1a1a2e",
                        "secondary-dark": "#0f0f1a"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background-dark font-['Space_Grotesk']">
    <div class="admin-login-container">
        <div class="admin-login-card glass-card">
            <div class="logo text-center mb-8">
                <div class="inline-flex items-center gap-2">
                    <div class="w-12 h-12 bg-primary/20 border border-primary/50 rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-2xl">precision_manufacturing</span>
                    </div>
                    <span class="text-2xl font-bold text-white">STD<span class="text-primary font-light">GRIND</span></span>
                </div>
            </div>
            
            <h1 class="text-2xl font-bold text-white text-center mb-2">Admin Portal</h1>
            <p class="text-slate-400 text-center mb-8">Sign in to access the management dashboard</p>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-primary mb-2">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">person</span>
                        <input type="text" id="username" name="username" 
                               class="w-full bg-secondary-dark border border-white/10 text-white rounded-lg py-3 pl-10 pr-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                               placeholder="Enter username" required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-primary mb-2">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">lock</span>
                        <input type="password" id="password" name="password" 
                               class="w-full bg-secondary-dark border border-white/10 text-white rounded-lg py-3 pl-10 pr-4 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                               placeholder="Enter password" required>
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-sm" id="password-toggle-icon">visibility</span>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-secondary-dark text-primary focus:ring-primary">
                        <span class="text-sm text-slate-400">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-primary hover:text-primary-dark transition-colors">Forgot password?</a>
                </div>
                
                <button type="submit" 
                        class="w-full bg-primary text-background-dark py-3 rounded-lg font-bold hover:bg-primary-dark transition-all flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <p class="text-xs text-slate-500">Default credentials: admin / admin123</p>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const result = await AdminPanel.login(username, password);
            
            if (result.success) {
                GrindingEquipmentB2B.showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                GrindingEquipmentB2B.showToast(result.message, 'error');
            }
        });
    </script>
</body>
</html>
