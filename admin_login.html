<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - STD Material</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#00d4aa',
                        'primary-dark': '#00b894',
                        dark: '#0a0a0f',
                        'dark-light': '#1a1a2e',
                        'dark-lighter': '#252542',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
        }
        .gradient-text {
            background: linear-gradient(135deg, #00d4aa 0%, #5eead4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(15, 15, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #00d4aa;
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary/20 to-primary/5 border border-primary/30 flex items-center justify-center">
                    <svg class="w-7 h-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold">
                    <span class="text-white">STD</span>
                    <span class="gradient-text">Material</span>
                </span>
            </div>
            <p class="text-slate-400">Admin Portal</p>
        </div>

        <!-- Login Form -->
        <div class="glass rounded-2xl p-8">
            <h1 class="text-2xl font-bold text-white text-center mb-2">Welcome Back</h1>
            <p class="text-slate-400 text-center mb-8">Sign in to access admin dashboard</p>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 focus:outline-none"
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 focus:outline-none"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-600 bg-dark-light text-primary focus:ring-primary">
                        <span class="ml-2 text-sm text-slate-400">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-primary hover:text-primary-light transition-colors">Forgot password?</a>
                </div>

                <button 
                    type="submit"
                    class="w-full py-3 px-4 bg-gradient-to-r from-primary to-primary-dark text-dark font-bold rounded-xl hover:shadow-lg hover:shadow-primary/25 transition-all"
                >
                    Sign In
                </button>
            </form>

            <div id="errorMessage" class="hidden mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
            </div>
        </div>

        <!-- Back to site -->
        <div class="text-center mt-6">
            <a href="../index.html" class="text-slate-400 hover:text-white transition-colors text-sm">← Back to website</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            // TODO: 实现真实的登录验证
            // 目前为演示，直接跳转到仪表盘
            if (username && password) {
                // 模拟登录成功
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.textContent = 'Please enter both username and password';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
