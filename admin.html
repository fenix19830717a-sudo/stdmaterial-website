<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polmarket Bot 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0f; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4aa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #151520; border-radius: 12px; padding: 20px; border: 1px solid #252535; }
        .card h2 { color: #00d4aa; margin-bottom: 15px; font-size: 18px; }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .status-dot.running { background: #00d4aa; box-shadow: 0 0 10px #00d4aa; }
        .status-dot.stopped { background: #ff4757; }
        .btn { background: #00d4aa; color: #0a0a0f; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn:hover { background: #00b894; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #ff3344; }
        .logs { background: #0a0a0f; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00d4aa; }
        .stat-label { color: #888; font-size: 14px; }
        .refresh { text-align: center; margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Polmarket Bot 管理后台</h1>
        
        <div class="grid">
            <div class="card">
                <h2>Bot 状态</h2>
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">检查中...</span>
                </div>
                <div id="pidInfo"></div>
                <br>
                <button class="btn" onclick="startBot()">▶ 启动 Bot</button>
                <button class="btn btn-danger" onclick="stopBot()">⏹ 停止 Bot</button>
            </div>
            
            <div class="card">
                <h2>交易统计</h2>
                <div class="stat-value" id="totalTrades">-</div>
                <div class="stat-label">总交易次数</div>
                <br>
                <div class="stat-value" id="totalPnl">-</div>
                <div class="stat-label">总盈亏</div>
            </div>
            
            <div class="card">
                <h2>投资组合</h2>
                <div class="stat-value" id="invested">-</div>
                <div class="stat-label">已投资</div>
                <br>
                <div class="stat-value" id="available">-</div>
                <div class="stat-label">可用资金</div>
            </div>
        </div>
        
        <div class="card">
            <h2>实时日志</h2>
            <div class="logs" id="logs">加载中...</div>
            <div class="refresh">自动刷新: <span id="countdown">5</span>秒</div>
        </div>
    </div>

    <script>
        const API_URL = "/api";
        let refreshInterval;

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_URL}/bot/status`);
                const data = await res.json();
                const dot = document.getElementById("statusDot");
                const text = document.getElementById("statusText");
                const pid = document.getElementById("pidInfo");
                
                if (data.running) {
                    dot.className = "status-dot running";
                    text.textContent = "运行中";
                    pid.textContent = `PID: ${data.pid}`;
                } else {
                    dot.className = "status-dot stopped";
                    text.textContent = "已停止";
                    pid.textContent = "";
                }
            } catch (e) {
                document.getElementById("statusText").textContent = "连接失败";
            }
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/bot/stats`);
                const data = await res.json();
                document.getElementById("totalTrades").textContent = data.totalTrades || 0;
                document.getElementById("totalPnl").textContent = (data.totalPnl || 0) + "%";
            } catch (e) {}
        }

        async function fetchPortfolio() {
            try {
                const res = await fetch(`${API_URL}/bot/portfolio`);
                const data = await res.json();
                document.getElementById("invested").textContent = "$" + (data.invested || 0).toLocaleString();
                document.getElementById("available").textContent = "$" + (data.available || 0).toLocaleString();
            } catch (e) {}
        }

        async function fetchLogs() {
            try {
                const res = await fetch(`${API_URL}/bot/logs?lines=50`);
                const data = await res.json();
                document.getElementById("logs").textContent = data.logs ? data.logs.join("\n") : "暂无日志";
            } catch (e) {
                document.getElementById("logs").textContent = "加载日志失败";
            }
        }

        async function startBot() {
            try {
                await fetch(`${API_URL}/bot/start`, { method: "POST" });
                alert("Bot 启动命令已发送");
                setTimeout(fetchStatus, 2000);
            } catch (e) {
                alert("启动失败: " + e.message);
            }
        }

        async function stopBot() {
            try {
                await fetch(`${API_URL}/bot/stop`, { method: "POST" });
                alert("Bot 停止命令已发送");
                setTimeout(fetchStatus, 2000);
            } catch (e) {
                alert("停止失败: " + e.message);
            }
        }

        function refreshAll() {
            fetchStatus();
            fetchStats();
            fetchPortfolio();
            fetchLogs();
        }

        // 倒计时刷新
        let countdown = 5;
        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                countdown = 5;
                refreshAll();
            }
            document.getElementById("countdown").textContent = countdown;
        }, 1000);

        // 初始加载
        refreshAll();
    </script>
</body>
</html>
