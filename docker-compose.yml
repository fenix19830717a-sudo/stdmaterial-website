version: '3.8'

services:
  # OpenClaw AI Agent
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      - OPENCLAW_CONFIG_PATH=/app/config
      - OPENCLAW_STORAGE_PATH=/app/data
      - OPENCLAW_LOG_PATH=/app/logs
    volumes:
      - ./openclaw/config:/app/config
      - ./openclaw/data:/app/data
      - ./openclaw/logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - openclaw_network
    depends_on:
      - redis
      - mysql
  
  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - openclaw_network
  
  # MySQL for data storage
  mysql:
    image: mysql:8.0
    container_name: openclaw_mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root-password
      - MYSQL_DATABASE=openclaw
      - MYSQL_USER=openclaw
      - MYSQL_PASSWORD=openclaw-password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - openclaw_network
  
  # Nginx for reverse proxy
  nginx:
    image: nginx:alpine
    container_name: openclaw_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./website:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    networks:
      - openclaw_network
    depends_on:
      - openclaw

volumes:
  redis_data:
  mysql_data:

networks:
  openclaw_network:
    driver: bridge
