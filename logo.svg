<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3080ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c9dff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon - Grinding mill representation -->
  <g transform="translate(10, 10)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#blueGradient)" stroke-width="2"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="url(#blueGradient)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="20" cy="8" r="3" fill="#3080ff"/>
    <circle cx="28" cy="20" r="3" fill="#3080ff"/>
    <circle cx="20" cy="32" r="3" fill="#3080ff"/>
    <circle cx="12" cy="20" r="3" fill="#3080ff"/>
  </g>
  
  <!-- Text -->
  <text x="55" y="28" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">STD</text>
  <text x="55" y="48" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#3080ff" letter-spacing="2">MATERIAL</text>
</svg>
